name: 🚀 Manual Build & Push ---> django-api

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # ==============================
      # 📥 Checkout Code
      # ==============================
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      # ==============================
      # 🔐 Docker Login
      # ==============================
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==============================
      # 🧠 Info
      # ==============================
      - name: 🧠 Show Info
        run: |
          echo "🚀 Manual Django Build Triggered"
          echo "📦 Image: pythoncodelife/django-api:latest"
          echo "🕒 Time: $(date)"

      # ==============================
      # 🐳 Build Image
      # ==============================
      - name: 🐳 Build Docker Image
        run: |
          docker build -t pythoncodelife/django-api:latest .

      # ==============================
      # 📤 Push Image
      # ==============================
      - name: 📤 Push Docker Image
        run: |
          docker push pythoncodelife/django-api:latest

      # ==============================
      # 🎉 Done
      # ==============================
      - name: 🎉 Done
        run: |
          echo "✅ Django Docker Image Ready"
